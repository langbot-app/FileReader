apiVersion: v1
kind: Plugin
metadata:
  author: wangcham
  name: FileReader
  repository: 'https://github.com/langbot-app/FileReader'
  version: 1.1.0
  description:
    en_US: 'File Reader - Read files sent by users and extract structured text for AI processing. Works with GeneralParsers plugin. Supports PDF, Word, Markdown, HTML, TXT and image files. Currently only supports WeCom intelligent bot, DingTalk bot, and Feishu bot.'
    zh_Hans: '文件阅读器 - 读取用户发送的文件并提取结构化文本供AI处理。需配合GeneralParsers插件使用。支持PDF、Word、Markdown、HTML、TXT和图片文件。目前仅支持企业微信智能机器人、钉钉机器人和飞书机器人。'
  label:
    en_US: File Reader
    zh_Hans: 文件阅读器
  icon: assets/icon.svg

spec:
  config:
    - name: max_content_length
      label:
        en_US: Max Content Length
        zh_Hans: 最大内容长度
      type: integer
      required: false
      description:
        en_US: 'Maximum length of file content to process. Content exceeding this limit will be truncated.'
        zh_Hans: '处理的文件内容最大长度。超过此限制的内容将被截断。'
      default: 50000
    
    - name: auto_process
      label:
        en_US: Auto Process
        zh_Hans: 自动处理
      type: boolean
      required: false
      description:
        en_US: 'Automatically process files when received without requiring explicit commands.'
        zh_Hans: '收到文件时自动处理，无需显式命令。'
      default: true
    
    - name: download_path
      label:
        en_US: Download Path
        zh_Hans: 下载路径
      type: string
      required: false
      description:
        en_US: 'Custom path to save downloaded files. Leave empty to use default data/files directory.'
        zh_Hans: '自定义文件下载保存路径。留空则使用默认的data/files目录。'
      default: ''
    
    - name: auto_clean_days
      label:
        en_US: Auto Clean Days
        zh_Hans: 自动清理天数
      type: integer
      required: false
      description:
        en_US: 'Automatically delete files older than this many days. Set to 0 to disable auto cleaning.'
        zh_Hans: '自动删除超过指定天数的文件。设置为0则禁用自动清理。'
      default: 7
    
    - name: max_storage_mb
      label:
        en_US: Max Storage (MB)
        zh_Hans: 最大存储空间(MB)
      type: integer
      required: false
      description:
        en_US: 'Maximum storage space for downloaded files in MB. When exceeded, oldest files will be deleted.'
        zh_Hans: '下载文件的最大存储空间（MB）。超过时将删除最旧的文件。'
      default: 500
    

  components:
    event_listener:
      fromFiles:
        - components/event_listener/file_handler.yaml

execution:
  python:
    path: main.py
    attr: FileReaderPlugin
